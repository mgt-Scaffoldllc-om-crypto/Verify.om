<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.G.T Verification</title>
    <style>
        :root { --p-blue: #1a237e; --a-red: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; margin: 0; text-align: center; }
        header { background: var(--p-blue); color: white; padding: 30px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo { width: 130px; height: auto; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); }
        .h1 { font-size: 18px; font-weight: bold; text-transform: uppercase; margin: 0; }
        .h2 { font-size: 15px; color: #ffeb3b; margin-top: 5px; }
        .box { background: white; width: 90%; max-width: 400px; margin: 40px auto; padding: 30px; border-radius: 12px; border-top: 6px solid var(--a-red); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background: var(--p-blue); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { display: none; background: white; width: 95%; max-width: 500px; margin: 20px auto; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .res-head { padding: 20px; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #eee; }
        .p-img { width: 100px; height: 120px; border: 2px solid var(--p-blue); object-fit: cover; }
        .info { padding: 15px; text-align: left; display: grid; grid-template-columns: 1fr 1.5fr; gap: 10px; font-size: 14px; }
        .l { font-weight: bold; background: #f0f2f5; padding: 8px; border-radius: 4px; }
        .v { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/LzN2mD1/mgt-logo.png" alt="MGT" class="logo">
    <div class="h1">CONSTRUCTION INDUSTRY SCAFFOLDERS RECORD SCHEME</div>
    <div class="h2">Organization: M.G.T</div>
</header>

<div class="box" id="searchArea">
    <input type="text" id="idInput" placeholder="Enter Resident ID">
    <button onclick="check()">VERIFY NOW</button>
</div>

<div id="result">
    <div class="res-head">
        <img id="u-img" src="" class="p-img">
        <div style="text-align: left;">
            <div id="u-id" style="color:red; font-weight:bold;"></div>
            <div id="u-name" style="font-size: 18px; font-weight:bold; color:var(--p-blue);"></div>
        </div>
    </div>
    <div class="info" id="info-box"></div>
    <button onclick="location.reload()" style="margin:15px; width:80%; background:#666;">NEW SEARCH</button>
</div>

<script>
    async function check() {
        const id = document.getElementById('idInput').value.trim();
        if(!id) return alert("Enter ID");
        
        const sId = '1VUOSxbE0F58jZliNYntcalr47nw4I0of8gS3IUFkS0Q';
        const url = `https://docs.google.com/spreadsheets/d/${sId}/gviz/tq?tqx=out:csv`;

        try {
            const res = await fetch(url);
            const csv = await res.text();
            const rows = csv.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim()));
            const data = rows.find(r => r[3] === id);

            if(data) {
                document.getElementById('u-id').innerText = "ID: " + data[3];
                document.getElementById('u-name').innerText = data[0];
                document.getElementById('u-img').src = data[7];
                document.getElementById('info-box').innerHTML = `
                    <div class="l">NAME</div><div class="v">${data[0]}</div>
                    <div class="l">LOCATION</div><div class="v">${data[2]}</div>
                    <div class="l">EXPIRY</div><div class="v" style="color:red; font-weight:bold;">${data[5]}</div>
                    <div class="l">STATUS</div><div class="v" style="color:green; font-weight:bold;">✓ VERIFIED</div>
                `;
                document.getElementById('result').style.display = "block";
                document.getElementById('searchArea').style.display = "none";
            } else { alert("Record Not Found"); }
        } catch (e) { alert("Error!"); }
    }
</script>
</body>
</html>
