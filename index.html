<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.G.T Record Verification</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
:root { --primary-blue: #1a237e; --accent-red: #d32f2f; }
body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

/* হেডার ও লোগো সেকশন */
header { width: 100%; background: var(--primary-blue); color: white; padding: 25px 0; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.main-logo { width: 120px; height: auto; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3)); }
.heading-main { font-size: 19px; font-weight: bold; margin: 0; padding: 0 15px; text-transform: uppercase; line-height: 1.4; letter-spacing: 1px; }
.sub-heading { font-size: 16px; margin-top: 8px; color: #ffeb3b; font-weight: bold; }

/* ইনপুট বক্স */
.container { background: white; width: 90%; max-width: 450px; margin-top: 35px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--accent-red); text-align: center; }
h2 { font-size: 20px; color: #333; margin-bottom: 20px; }
input[type="text"] { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; text-align: center; }
button { width: 100%; background: var(--primary-blue); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { background: #0d47a1; }

/* রেজাল্ট কার্ড */
#resultCard { display: none; background: white; width: 95%; max-width: 550px; margin: 30px 0; border-radius: 15px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid #ddd; }
.result-header { padding: 25px; display: flex; align-items: center; gap: 20px; background: #fff; border-bottom: 1px solid #eee; }
.profile-pic { width: 110px; height: 135px; border: 3px solid var(--primary-blue); border-radius: 5px; object-fit: cover; background: #f0f0f0; }

.info-grid { padding: 20px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 12px; font-size: 14px; }
.label { font-weight: bold; color: #555; background: #f8f9fa; padding: 10px; border-radius: 5px; border-left: 4px solid var(--primary-blue); }
.value { padding: 10px; color: #222; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; }

/* QR কোড */
.qr-section { text-align: center; padding: 20px; background: #f9f9f9; border-top: 1px dashed #ccc; }
.qr-image { width: 130px; height: 130px; border: 5px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

footer { margin-top: auto; padding: 30px; font-size: 13px; color: #666; text-align: center; line-height: 1.6; }
.loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-blue); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
    <img src="https://i.ibb.co/LzN2mD1/mgt-logo.png" alt="MGT Logo" class="main-logo">
    <div class="heading-main">CONSTRUCTION INDUSTRY SCAFFOLDERS RECORD SCHEME</div>
    <div class="sub-heading">Organization: M.G.T</div>
</header>

<div class="container" id="searchBox">
    <h2>Record Verification Portal</h2>
    <div id="loader" class="loader"></div>
    <input type="text" id="certInput" placeholder="Enter Resident ID / Iqama">
    <button onclick="verifyID()">SEARCH RECORD</button>
</div>

<div id="resultCard">
    <div style="background: #f1f1f1; padding: 10px; text-align: center; font-weight: bold; color: var(--primary-blue);">M.G.T OFFICIAL VERIFICATION</div>
    <div class="result-header">
        <img id="u_photo" src="" alt="Photo" class="profile-pic" onerror="this.src='https://via.placeholder.com/110x135?text=No+Photo'">
        <div>
            <div id="u_resident" style="color: var(--accent-red); font-weight: bold; font-size: 18px; margin-bottom: 5px;"></div>
            <div id="u_name" style="font-weight: bold; font-size: 20px; color: #1a237e;"></div>
        </div>
    </div>

    <div class="info-grid" id="infoContent">
        </div>

    <div class="qr-section">
        <img id="qr_image" class="qr-image" src="" alt="QR Code">
        <div style="font-size: 11px; color: #777; margin-top: 10px;">SCAN TO VERIFY THIS RECORD ONLINE</div>
    </div>

    <button onclick="window.location.reload()" style="margin: 20px; width: calc(100% - 40px); background: #666;">NEW SEARCH</button>
</div>

<footer>
    © 2014 M.G.T - Management Group Training.<br>
    Verified Record Scheme for Construction Industry Scaffolders.
</footer>

<script>
// ১. ব্রাউজারের অ্যাড্রেস বার থেকে index.html সরানোর জন্য
if (window.location.href.includes("index.html")) {
    window.history.replaceState({}, document.title, window.location.pathname.replace("index.html", ""));
}

async function verifyID() {
    const inputID = document.getElementById('certInput').value.trim();
    const loader = document.getElementById('loader');
    const resultCard = document.getElementById('resultCard');
    const searchBox = document.getElementById('searchBox');

    if (!inputID) {
        alert("Please enter a Resident ID!");
        return;
    }

    loader.style.display = "block";

    // আপনার গুগল শিট ডাটা সোর্স
    const sheetId = '1VUOSxbE0F58jZliNYntcalr47nw4I0of8gS3IUFkS0Q';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    try {
        const response = await fetch(url);
        const csvData = await response.text();
        const rows = csvData.split('\n').map(row => 
            row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim())
        );

        // শিটের Resident Id (Column D) এর সাথে ম্যাচিং
        const match = rows.find(row => row[3] === inputID);

        if (match) {
            document.getElementById('u_resident').innerText = "ID: " + match[3];
            document.getElementById('u_name').innerText = match[0];

            const infoGrid = document.getElementById('infoContent');
            infoGrid.innerHTML = `
                <div class="label">NAME</div> <div class="value">${match[0]}</div>
                <div class="label">TRAINER</div> <div class="value">${match[1]}</div>
                <div class="label">LOCATION</div> <div class="value">${match[2]}</div>
                <div class="label">ISSUE DATE</div> <div class="value">${match[4]}</div>
                <div class="label">EXPIRY DATE</div> <div class="value" style="color:red; font-weight:bold;">${match[5]}</div>
                <div class="label">CERTIFIED AS</div> <div class="value">${match[6]}</div>
                <div class="label">STATUS</div> <div class="value" style="color:green; font-weight:bold;">✓ VERIFIED</div>
            `;

            document.getElementById('u_photo').src = match[7]; 

            // QR Code জেনারেশন
            const currentURL = window.location.href;
            document.getElementById('qr_image').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(currentURL)}`;

            resultCard.style.display = "block";
            searchBox.style.display = "none";
        } else {
            alert("Record Not Found! Please check the ID.");
        }
    } catch (error) {
        alert("Database connection error.");
    } finally {
        loader.style.display = "none";
    }
}
</script>

</body>
</html>
