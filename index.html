<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.G.T Record Verification</title>
<style>
:root { --primary-blue: #1a237e; --accent-red: #d32f2f; }
body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
header { width: 100%; background: var(--primary-blue); color: white; padding: 35px 0; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.heading-main { font-size: 18px; font-weight: bold; margin: 0; padding: 0 15px; text-transform: uppercase; letter-spacing: 0.5px; }
.sub-heading { font-size: 15px; margin-top: 8px; color: #ffeb3b; font-weight: bold; }
.container { background: white; width: 90%; max-width: 450px; margin-top: 30px; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid var(--accent-red); text-align: center; }
input[type="text"] { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; outline: none; }
button { width: 100%; background: var(--primary-blue); color: white; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
#resultCard { display: none; background: white; width: 95%; max-width: 550px; margin: 30px 0; border-radius: 15px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.15); border: 1px solid #ddd; }
.result-header { padding: 20px; display: flex; align-items: center; gap: 20px; }
.profile-pic { width: 110px; height: 135px; border: 3px solid var(--primary-blue); border-radius: 5px; object-fit: cover; }
.info-grid { padding: 20px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 12px; font-size: 14px; text-align: left; }
.label { font-weight: bold; color: #555; background: #f8f9fa; padding: 10px; border-radius: 5px; border-left: 4px solid var(--primary-blue); }
.value { padding: 10px; color: #222; border-bottom: 1px solid #f0f0f0; }
.qr-section { text-align: center; padding: 20px; background: #f9f9f9; border-top: 1px dashed #ccc; }
.qr-section img { width: 150px; height: 150px; border: 4px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
footer { margin-top: auto; padding: 25px; font-size: 12px; color: #666; text-align: center; }
.loader { display: none; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-blue); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 20px auto; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
    <div class="heading-main">CONSTRUCTION INDUSTRY SCAFFOLDERS RECORD SCHEME</div>
    <div class="sub-heading">Organization: M.G.T</div>
</header>

<div class="container" id="searchBox">
    <div id="loader" class="loader"></div>
    <input type="text" id="certInput" placeholder="Enter Resident ID / Iqama">
    <button onclick="verifyID()">SEARCH RECORD</button>
</div>

<div id="resultCard">
    <div style="background: #f1f1f1; padding: 10px; text-align: center; font-weight: bold; color: var(--primary-blue);">M.G.T OFFICIAL VERIFICATION</div>
    <div class="result-header">
        <img id="u_photo" src="" alt="Photo" class="profile-pic">
        <div>
            <div id="u_resident" style="color: var(--accent-red); font-weight: bold; font-size: 18px; margin-bottom: 5px;"></div>
            <div id="u_name" style="font-weight: bold; font-size: 20px; color: #1a237e;"></div>
        </div>
    </div>
    <div class="info-grid" id="infoContent"></div>
    
    <div class="qr-section">
        <img id="qr_image" src="" alt="QR Code">
        <div style="font-size: 11px; color: #777; margin-top: 8px;">SCAN TO VERIFY THIS RECORD ONLINE</div>
    </div>

    <button onclick="window.location.reload()" style="margin: 20px; width: calc(100% - 40px); background: #666; color: white; padding: 12px; border: none; border-radius: 8px;">NEW SEARCH</button>
</div>

<footer>
    © 2012 M.G.T - Management Group Training.<br>
    Verified Record Scheme for Construction Industry Scaffolders.
</footer>

<script>
async function verifyID(searchID = null) {
    const inputID = searchID || document.getElementById('certInput').value.trim();
    const loader = document.getElementById('loader');
    
    if (!inputID) { alert("Please enter ID!"); return; }
    
    loader.style.display = "block";
    const sheetId = '1VUOSxbE0F58jZliNYntcalr47nw4I0of8gS3IUFkS0Q';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    try {
        const response = await fetch(url);
        const data = await response.text();
        const rows = data.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/"/g, '').trim()));
        const match = rows.find(row => row[3] === inputID);

        if (match) {
            document.getElementById('u_resident').innerText = "ID: " + match[3];
            document.getElementById('u_name').innerText = match[0];
            document.getElementById('u_photo').src = match[7];
            
            document.getElementById('infoContent').innerHTML = `
                <div class="label">NAME</div> <div class="value">${match[0]}</div>
                <div class="label">TRAINER</div> <div class="value">${match[1]}</div>
                <div class="label">LOCATION</div> <div class="value">${match[2]}</div>
                <div class="label">ISSUE DATE</div> <div class="value">${match[4]}</div>
                <div class="label">EXPIRY DATE</div> <div class="value" style="color:red; font-weight:bold;">${match[5]}</div>
                <div class="label">STATUS</div> <div class="value" style="color:green; font-weight:bold;">✓ VERIFIED</div>
            `;

            // কিউআর কোডে সরাসরি আপনার ওয়েব লিংকটি দেওয়া হয়েছে
            const webLink = `https://mgt-om-crypto.github.io/mgt-certificate-verify/?id=${match[3]}`;
            document.getElementById('qr_image').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(webLink)}`;

            document.getElementById('resultCard').style.display = "block";
            document.getElementById('searchBox').style.display = "none";
        } else { alert("Not Found!"); }
    } catch (e) { alert("Error connecting to database!"); }
    finally { loader.style.display = "none"; }
}

// পেজ লোড হওয়ার সময় ইউআরএল এ আইডি থাকলে সরাসরি সার্চ করবে (ভিডিওর মতো)
window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const idParam = urlParams.get('id');
    if (idParam) {
        verifyID(idParam);
    }
}
</script>
</body>
</html>
